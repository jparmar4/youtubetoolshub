# Runs after code is pushed to main/master (or manually).
# Submits IndexNow + verifies production is healthy.
#
# Secrets (optional but recommended for --via-api):
#   INDEXNOW_ADMIN_SECRET  — same as production env
#
# If the site is on Hostinger and deploy is manual FTP/SSH,
# still use: npm run deploy:post after you go live.

name: Post-deploy SEO (IndexNow)

on:
  workflow_dispatch:
    inputs:
      full_sitemap:
        description: "Also submit full sitemap to IndexNow"
        type: boolean
        default: true
      base_url:
        description: "Production site URL"
        required: true
        default: "https://www.youtubetoolshub.com"
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "package.json"
      - "next.config.mjs"

concurrency:
  group: post-deploy-seo
  cancel-in-progress: true

jobs:
  indexnow:
    name: Health + IndexNow + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for production health
        env:
          BASE: ${{ github.event.inputs.base_url || 'https://www.youtubetoolshub.com' }}
        run: |
          set -e
          echo "Pinging $BASE/api/health"
          for i in $(seq 1 18); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$BASE/api/health" || true)
            echo "attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json || true
              exit 0
            fi
            sleep 10
          done
          echo "Site not healthy after retries (deploy may still be in progress)."
          echo "Re-run this workflow after production is live, or run: npm run deploy:post"
          exit 1

      - name: IndexNow (priority)
        run: node scripts/submit-indexnow.mjs --priority

      - name: IndexNow (full sitemap)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_sitemap == 'true' || github.event_name == 'push' }}
        run: node scripts/submit-indexnow.mjs

      - name: Optional server IndexNow API
        if: ${{ secrets.INDEXNOW_ADMIN_SECRET != '' }}
        env:
          INDEXNOW_ADMIN_SECRET: ${{ secrets.INDEXNOW_ADMIN_SECRET }}
          BASE: ${{ github.event.inputs.base_url || 'https://www.youtubetoolshub.com' }}
        run: |
          code=$(curl -s -o /tmp/indexnow.json -w "%{http_code}" \
            -H "x-indexnow-secret: $INDEXNOW_ADMIN_SECRET" \
            "$BASE/api/indexnow" || true)
          echo "API IndexNow HTTP $code"
          cat /tmp/indexnow.json || true

      - name: Production smoke checklist
        run: node scripts/deploy-checklist.mjs --post --base "${{ github.event.inputs.base_url || 'https://www.youtubetoolshub.com' }}"
